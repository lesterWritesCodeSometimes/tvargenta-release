{% extends "base.html" %}
{% block title %}Login — TVArgenta Hub{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto card rounded-lg p-6 mt-12">
  <h2 class="text-lg font-bold mb-4 text-center">Admin login</h2>
  {% if error %}
  <div class="text-red-400 text-sm mb-3 text-center">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="password" name="password" autofocus placeholder="Contraseña"
           class="w-full rounded bg-gray-900 border border-gray-700 px-3 py-2 mb-4 text-white focus:outline-none focus:border-blue-500">
    <button class="w-full rounded bg-blue-600 hover:bg-blue-700 py-2 font-bold">Entrar</button>
  </form>
</div>
{% endblock %}
